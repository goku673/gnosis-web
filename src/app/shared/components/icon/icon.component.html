<svg
  [attr.width]="size"
  [attr.height]="size"
  [class]="customClass"
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 24 24"
  fill="none"
  stroke="currentColor"
  stroke-width="2"
  stroke-linecap="round"
  stroke-linejoin="round"
>
  @switch (name) {

    <!-- ── Dashboard ──────────────────────────────────────── -->
    @case ('home') {
      <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    }
    @case ('dashboard') {
      <rect width="7" height="7" x="3" y="3" rx="1"/>
      <rect width="7" height="7" x="14" y="3" rx="1"/>
      <rect width="7" height="7" x="14" y="14" rx="1"/>
      <rect width="7" height="7" x="3" y="14" rx="1"/>
    }
    @case ('chart-bar') {
      <line x1="12" x2="12" y1="20" y2="10"/>
      <line x1="18" x2="18" y1="20" y2="4"/>
      <line x1="6" x2="6" y1="20" y2="16"/>
    }
    @case ('chart-line') {
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    }
    @case ('chart-pie') {
      <path d="M21.21 15.89A10 10 0 1 1 8 2.83"/>
      <path d="M22 12A10 10 0 0 0 12 2v10z"/>
    }
    @case ('trending-up') {
      <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
      <polyline points="16 7 22 7 22 13"/>
    }
    @case ('trending-down') {
      <polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/>
      <polyline points="16 17 22 17 22 11"/>
    }

    <!-- ── Usuarios / Personas ────────────────────────────── -->
    @case ('user') {
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    }
    @case ('user-circle') {
      <circle cx="12" cy="12" r="10"/>
      <circle cx="12" cy="10" r="3"/>
      <path d="M7 20.662V19a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.662"/>
    }
    @case ('user-plus') {
      <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <line x1="19" x2="19" y1="8" y2="14"/>
      <line x1="22" x2="16" y1="11" y2="11"/>
    }
    @case ('user-minus') {
      <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <line x1="22" x2="16" y1="11" y2="11"/>
    }
    @case ('user-check') {
      <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <polyline points="16 11 18 13 22 9"/>
    }
    @case ('users') {
      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
      <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
    }
    @case ('settings') {
      <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
      <circle cx="12" cy="12" r="3"/>
    }
    @case ('book-open') {
      <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
      <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
    }
    @case ('clock') {
      <circle cx="12" cy="12" r="10"/>
      <polyline points="12 6 12 12 16 14"/>
    }
    @case ('clipboard-list') {
      <rect width="8" height="4" x="8" y="2" rx="1" ry="1"/>
      <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
      <line x1="12" x2="16" y1="11" y2="11"/>
      <line x1="12" x2="16" y1="16" y2="16"/>
      <line x1="8" x2="8.01" y1="11" y2="11"/>
      <line x1="8" x2="8.01" y1="16" y2="16"/>
    }

    <!-- ── Autenticación ──────────────────────────────────── -->
    @case ('login') {
      <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
      <polyline points="10 17 15 12 10 7"/>
      <line x1="15" x2="3" y1="12" y2="12"/>
    }
    @case ('logout') {
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
      <polyline points="16 17 21 12 16 7"/>
      <line x1="21" x2="9" y1="12" y2="12"/>
    }
    @case ('lock') {
      <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    }
    @case ('unlock') {
      <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 9.9-1"/>
    }
    @case ('eye') {
      <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
      <circle cx="12" cy="12" r="3"/>
    }
    @case ('eye-off') {
      <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/>
      <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/>
      <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/>
      <line x1="2" x2="22" y1="2" y2="22"/>
    }
    @case ('shield') {
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    }
    @case ('key') {
      <circle cx="7.5" cy="15.5" r="5.5"/>
      <path d="m21 2-9.6 9.6"/>
      <path d="m15.5 7.5 3 3L22 7l-3-3"/>
    }

    <!-- ── Documentos / Archivos ──────────────────────────── -->
    @case ('file') {
      <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/>
      <polyline points="14 2 14 8 20 8"/>
    }
    @case ('file-text') {
      <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="16" x2="8" y1="13" y2="13"/>
      <line x1="16" x2="8" y1="17" y2="17"/>
      <line x1="10" x2="8" y1="9" y2="9"/>
    }
    @case ('file-plus') {
      <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="12" x2="12" y1="18" y2="12"/>
      <line x1="9" x2="15" y1="15" y2="15"/>
    }
    @case ('file-minus') {
      <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="9" x2="15" y1="15" y2="15"/>
    }
    @case ('file-check') {
      <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/>
      <polyline points="14 2 14 8 20 8"/>
      <polyline points="9 15 11 17 15 13"/>
    }
    @case ('folder') {
      <path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/>
    }
    @case ('folder-open') {
      <path d="m6 14 1.5-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.54 6a2 2 0 0 1-1.95 1.5H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.9a2 2 0 0 1 1.69.9l.81 1.2a2 2 0 0 0 1.67.9H18a2 2 0 0 1 2 2v2"/>
    }
    @case ('upload') {
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" x2="12" y1="3" y2="15"/>
    }
    @case ('download') {
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" x2="12" y1="15" y2="3"/>
    }
    @case ('paperclip') {
      <path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
    }

    <!-- ── Navegación vertical ────────────────────────────── -->
    @case ('menu') {
      <line x1="4" x2="20" y1="12" y2="12"/>
      <line x1="4" x2="20" y1="6" y2="6"/>
      <line x1="4" x2="20" y1="18" y2="18"/>
    }
    @case ('menu-close') {
      <line x1="18" x2="6" y1="6" y2="18"/>
      <line x1="6" x2="18" y1="6" y2="18"/>
    }
    @case ('chevron-up') {
      <polyline points="18 15 12 9 6 15"/>
    }
    @case ('chevron-down') {
      <polyline points="6 9 12 15 18 9"/>
    }
    @case ('chevron-left') {
      <polyline points="15 18 9 12 15 6"/>
    }
    @case ('chevron-right') {
      <polyline points="9 18 15 12 9 6"/>
    }
    @case ('arrow-up') {
      <line x1="12" x2="12" y1="19" y2="5"/>
      <polyline points="5 12 12 5 19 12"/>
    }
    @case ('arrow-down') {
      <line x1="12" x2="12" y1="5" y2="19"/>
      <polyline points="19 12 12 19 5 12"/>
    }
    @case ('arrow-left') {
      <line x1="19" x2="5" y1="12" y2="12"/>
      <polyline points="12 19 5 12 12 5"/>
    }
    @case ('arrow-right') {
      <line x1="5" x2="19" y1="12" y2="12"/>
      <polyline points="12 5 19 12 12 19"/>
    }
    @case ('external-link') {
      <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
      <polyline points="15 3 21 3 21 9"/>
      <line x1="10" x2="21" y1="14" y2="3"/>
    }

    <!-- ── Navegación horizontal / Layout ────────────────── -->
    @case ('tab-add') {
      <rect width="18" height="14" x="3" y="5" rx="2"/>
      <line x1="12" x2="12" y1="9" y2="15"/>
      <line x1="9" x2="15" y1="12" y2="12"/>
    }
    @case ('tab-remove') {
      <rect width="18" height="14" x="3" y="5" rx="2"/>
      <line x1="9" x2="15" y1="12" y2="12"/>
    }
    @case ('tab-next') {
      <rect width="18" height="14" x="3" y="5" rx="2"/>
      <polyline points="9 9 15 12 9 15"/>
    }
    @case ('tab-prev') {
      <rect width="18" height="14" x="3" y="5" rx="2"/>
      <polyline points="15 9 9 12 15 15"/>
    }
    @case ('grid') {
      <rect width="7" height="7" x="3" y="3" rx="1"/>
      <rect width="7" height="7" x="14" y="3" rx="1"/>
      <rect width="7" height="7" x="14" y="14" rx="1"/>
      <rect width="7" height="7" x="3" y="14" rx="1"/>
    }
    @case ('columns') {
      <rect width="18" height="18" x="3" y="3" rx="2"/>
      <line x1="12" x2="12" y1="3" y2="21"/>
    }
    @case ('rows') {
      <rect width="18" height="18" x="3" y="3" rx="2"/>
      <line x1="3" x2="21" y1="12" y2="12"/>
    }
    @case ('table') {
      <path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
      <path d="M3 10h18"/>
      <path d="M10 3v18"/>
    }
    @case ('sheet') {
      <rect width="18" height="18" x="3" y="3" rx="2"/>
      <path d="M3 9h18"/>
      <path d="M3 15h18"/>
      <path d="M9 3v18"/>
      <path d="M15 3v18"/>
    }

    <!-- ── Notificaciones ─────────────────────────────────── -->
    @case ('bell') {
      <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/>
      <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
    }
    @case ('bell-off') {
      <path d="M8.7 3A6 6 0 0 1 18 8a21.3 21.3 0 0 0 .6 5"/>
      <path d="M17 17H3s3-2 3-9a4.67 4.67 0 0 1 .3-1.7"/>
      <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
      <line x1="2" x2="22" y1="2" y2="22"/>
    }
    @case ('bell-dot') {
      <path d="M19.4 14.9C20.2 16.4 21 17 21 17H3s3-2 3-9a6 6 0 0 1 .7-2.8"/>
      <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
      <circle cx="18" cy="8" r="3" fill="currentColor" stroke="none"/>
    }
    @case ('info') {
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" x2="12" y1="8" y2="12"/>
      <line x1="12" x2="12.01" y1="16" y2="16"/>
    }
    @case ('alert-triangle') {
      <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/>
      <line x1="12" x2="12" y1="9" y2="13"/>
      <line x1="12" x2="12.01" y1="17" y2="17"/>
    }
    @case ('alert-circle') {
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" x2="12" y1="8" y2="12"/>
      <line x1="12" x2="12.01" y1="16" y2="16"/>
    }
    @case ('check-circle') {
      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
      <polyline points="22 4 12 14.01 9 11.01"/>
    }
    @case ('x-circle') {
      <circle cx="12" cy="12" r="10"/>
      <line x1="15" x2="9" y1="9" y2="15"/>
      <line x1="9" x2="15" y1="9" y2="15"/>
    }

    <!-- ── Configuración / UI ─────────────────────────────── -->
    @case ('sliders') {
      <line x1="4" x2="4" y1="21" y2="14"/>
      <line x1="4" x2="4" y1="6" y2="3"/>
      <line x1="12" x2="12" y1="21" y2="12"/>
      <line x1="12" x2="12" y1="6" y2="3"/>
      <line x1="20" x2="20" y1="21" y2="16"/>
      <line x1="20" x2="20" y1="10" y2="3"/>
      <line x1="1" x2="7" y1="14" y2="14"/>
      <line x1="9" x2="15" y1="8" y2="8"/>
      <line x1="17" x2="23" y1="16" y2="16"/>
    }
    @case ('toggle-left') {
      <rect width="20" height="12" x="2" y="6" rx="6" ry="6"/>
      <circle cx="8" cy="12" r="2"/>
    }
    @case ('toggle-right') {
      <rect width="20" height="12" x="2" y="6" rx="6" ry="6"/>
      <circle cx="16" cy="12" r="2"/>
    }
    @case ('sun') {
      <circle cx="12" cy="12" r="4"/>
      <line x1="12" x2="12" y1="2" y2="6"/>
      <line x1="12" x2="12" y1="18" y2="22"/>
      <line x1="4.93" x2="7.76" y1="4.93" y2="7.76"/>
      <line x1="16.24" x2="19.07" y1="16.24" y2="19.07"/>
      <line x1="2" x2="6" y1="12" y2="12"/>
      <line x1="18" x2="22" y1="12" y2="12"/>
      <line x1="4.93" x2="7.76" y1="19.07" y2="16.24"/>
      <line x1="16.24" x2="19.07" y1="7.76" y2="4.93"/>
    }
    @case ('moon') {
      <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
    }

    <!-- ── Acciones generales ──────────────────────────────── -->
    @case ('search') {
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" x2="16.65" y1="21" y2="16.65"/>
    }
    @case ('filter') {
      <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
    }
    @case ('sort') {
      <line x1="3" x2="21" y1="6" y2="6"/>
      <line x1="3" x2="15" y1="12" y2="12"/>
      <line x1="3" x2="9" y1="18" y2="18"/>
    }
    @case ('edit') {
      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
      <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
    }
    @case ('trash') {
      <polyline points="3 6 5 6 21 6"/>
      <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
      <line x1="10" x2="10" y1="11" y2="17"/>
      <line x1="14" x2="14" y1="11" y2="17"/>
    }
    @case ('save') {
      <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
      <polyline points="17 21 17 13 7 13 7 21"/>
      <polyline points="7 3 7 8 15 8"/>
    }
    @case ('copy') {
      <rect width="14" height="14" x="8" y="8" rx="2" ry="2"/>
      <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
    }
    @case ('paste') {
      <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
      <rect width="8" height="4" x="8" y="2" rx="1" ry="1"/>
    }
    @case ('plus') {
      <line x1="12" x2="12" y1="5" y2="19"/>
      <line x1="5" x2="19" y1="12" y2="12"/>
    }
    @case ('minus') {
      <line x1="5" x2="19" y1="12" y2="12"/>
    }
    @case ('x') {
      <line x1="18" x2="6" y1="6" y2="18"/>
      <line x1="6" x2="18" y1="6" y2="18"/>
    }
    @case ('check') {
      <polyline points="20 6 9 17 4 12"/>
    }
    @case ('refresh') {
      <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
      <path d="M21 3v5h-5"/>
      <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
      <path d="M8 16H3v5"/>
    }
    @case ('more-vertical') {
      <circle cx="12" cy="5" r="1"/>
      <circle cx="12" cy="12" r="1"/>
      <circle cx="12" cy="19" r="1"/>
    }
    @case ('more-horizontal') {
      <circle cx="5" cy="12" r="1"/>
      <circle cx="12" cy="12" r="1"/>
      <circle cx="19" cy="12" r="1"/>
    }
    @case ('print') {
      <polyline points="6 9 6 2 18 2 18 9"/>
      <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
      <rect width="12" height="8" x="6" y="14"/>
    }
    @case ('share') {
      <circle cx="18" cy="5" r="3"/>
      <circle cx="6" cy="12" r="3"/>
      <circle cx="18" cy="19" r="3"/>
      <line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/>
      <line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/>
    }
    @case ('link') {
      <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
      <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
    }

    <!-- ── Contacto / Educación ───────────────────────────── -->
    @case ('calendar') {
      <rect width="18" height="18" x="3" y="4" rx="2" ry="2"/>
      <line x1="16" x2="16" y1="2" y2="6"/>
      <line x1="8" x2="8" y1="2" y2="6"/>
