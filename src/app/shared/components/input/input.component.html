<div class="relative w-full">
  <!-- Ícono izquierdo -->
  @if (iconLeft) {
    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none">
      <app-icon [name]="iconLeft" [size]="iconSize"></app-icon>
    </span>
  }

  <!-- Input nativo -->
  <input
    [id]="inputId"
    [type]="resolvedType"
    [placeholder]="placeholder"
    [value]="value()"
    [disabled]="disabled"
    [class]="inputClasses"
    (input)="handleInput($event)"
    (focus)="handleFocus()"
    (blur)="handleBlur()"
  />

  <!-- Toggle password / Ícono derecho -->
  @if (type === 'password') {
    <button
      type="button"
      class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-naranja transition-colors cursor-pointer"
      (click)="togglePassword()"
    >
      <app-icon [name]="showPassword() ? 'eye-off' : 'eye'" [size]="iconSize"></app-icon>
    </button>
  } @else if (iconRight) {
    <span class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none">
      <app-icon [name]="iconRight" [size]="iconSize"></app-icon>
    </span>
  }

  <!-- Mensaje de error -->
  @if (errorMessage) {
    <p class="mt-1 text-xs text-red-500 flex items-center gap-1">
      <app-icon name="alert-circle" [size]="12"></app-icon>
      {{ errorMessage }}
    </p>
  }
</div>
