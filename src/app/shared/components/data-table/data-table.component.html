<div class="data-table-wrapper rounded-lg border border-gray-200 bg-white overflow-hidden" [class]="customClasses">
  <!-- Search Bar -->
  <div *ngIf="config.columns.some(c => c.filterable)" class="px-6 py-4 border-b border-gray-200 bg-gray-50">
    <input
      type="text"
      placeholder="Buscar..."
      class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
      [(ngModel)]="searchTerm"
      (input)="onSearch(searchTerm)"
    />
  </div>

  <!-- Table -->
  <div class="overflow-x-auto">
    <table class="w-full">
      <thead class="bg-gray-100 border-b border-gray-200">
        <tr>
          <!-- Checkbox Column -->
          <th *ngIf="config.selectable" class="px-6 py-3 text-left">
            <input
              type="checkbox"
              class="w-4 h-4 cursor-pointer"
              [checked]="isAllSelected()"
              (change)="onSelectAll($event)"
            />
          </th>

          <!-- Column Headers -->
          <th
            *ngFor="let column of config.columns"
            class="px-6 py-3 text-left text-sm font-semibold text-gray-700 uppercase tracking-wider"
            [style.width]="column.width"
            [class.cursor-pointer]="column.sortable"
            (click)="onSort(column)"
          >
            <div class="flex items-center gap-2">
              {{ column.header }}
              <span *ngIf="column.sortable && config.sortBy === column.key" class="text-xs">
                {{ config.sortOrder === 'asc' ? '↑' : '↓' }}
              </span>
            </div>
          </th>
        </tr>
      </thead>

      <tbody>
        <!-- Data Rows -->
        <tr
          *ngFor="let row of displayedData"
          class="border-b border-gray-200 transition-colors duration-200"
          [class]="getRowClass(row)"
          (click)="onRowClick(row)"
        >
          <!-- Checkbox Cell -->
          <td *ngIf="config.selectable" class="px-6 py-4 text-sm">
            <input
              type="checkbox"
              class="w-4 h-4 cursor-pointer"
              [checked]="isRowSelected(row)"
              (change)="onSelectRow(row, $event)"
            />
          </td>

          <!-- Data Cells -->
          <td
            *ngFor="let column of config.columns"
            [ngClass]="getCellClass(column, row)"
            [style.width]="column.width"
            class="text-sm text-gray-900"
          >
            <!-- Custom Renderer -->
            <ng-container *ngIf="column.customRenderer">
              <ng-container [innerHTML]="formatCellValue(getCellValue(row, column), column, row)"></ng-container>
            </ng-container>

            <!-- Status/Badge Type -->
            <span *ngIf="column.type === 'status' || column.type === 'badge'" [ngClass]="getStatusBadgeClass(getCellValue(row, column))" class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium">
              {{ formatCellValue(getCellValue(row, column), column, row) }}
            </span>

            <!-- Default -->
            <span *ngIf="!column.customRenderer && column.type !== 'status' && column.type !== 'badge'">
              {{ formatCellValue(getCellValue(row, column), column, row) }}
            </span>
          </td>
        </tr>

        <!-- Empty State -->
        <tr *ngIf="displayedData.length === 0">
          <td [attr.colspan]="config.selectable ? config.columns.length + 1 : config.columns.length" class="px-6 py-8 text-center text-gray-500">
            {{ config.emptyMessage || 'No hay datos disponibles' }}
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Pagination -->
  <div *ngIf="config.pageable && totalPages > 1" class="px-6 py-4 border-t border-gray-200 bg-gray-50 flex items-center justify-between">
    <div class="text-sm text-gray-600">
      Página {{ currentPage }} de {{ totalPages }}
    </div>
    <div class="flex gap-2">
      <button
        class="px-3 py-2 rounded-md border border-gray-300 text-sm font-medium text-gray-700 hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed"
        (click)="previousPage()"
        [disabled]="currentPage === 1"
      >
        ← Anterior
      </button>
      <button
        class="px-3 py-2 rounded-md border border-gray-300 text-sm font-medium text-gray-700 hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed"
        (click)="nextPage()"
        [disabled]="currentPage === totalPages"
      >
        Siguiente →
      </button>
    </div>
  </div>
</div>
