<header
  class="relative bg-azul text-white overflow-hidden flex items-center justify-center min-h-[85vh]"
>
  <!-- Background con overlay -->
  <div
    class="absolute inset-0 bg-cover bg-center transition-all duration-700"
    [style.backgroundImage]="'url(' + slides[currentSlide()].image + ')'"
  ></div>
  <div class="absolute inset-0 bg-black/60 z-0"></div>

  <!-- Contenido -->
  <div class="relative z-10 text-center max-w-4xl px-4 flex flex-col items-center">
    <app-badge variant="primary" icon="check-circle" customClass="mb-6">
      Formación Técnica Superior
    </app-badge>

    <app-text
      tag="h1"
      variant="white"
      size="3xl"
      weight="bold"
      customClass="text-5xl md:text-7xl mb-6 tracking-tight leading-tight"
    >
      {{ slides[currentSlide()].title }}
    </app-text>

    <app-text variant="white" customClass="text-lg md:text-xl mb-10 max-w-2xl leading-relaxed">
      {{ slides[currentSlide()].subtitle }}
    </app-text>

    <div class="flex flex-col sm:flex-row gap-4">
      <app-button variant="primary" size="lg" iconRight="chevron-right">
        Ver Cursos de Temporada
      </app-button>
      <app-button
        variant="outline"
        size="lg"
        customClass="border-white text-white hover:bg-white hover:text-azul"
      >
        Conocer la Carrera
      </app-button>
    </div>
  </div>

  <!-- Flechas de navegación -->
  <button
    (click)="prevSlide()"
    class="absolute left-4 top-1/2 -translate-y-1/2 z-20 bg-black/50 hover:bg-black/75 text-white p-3 rounded-full transition-all"
    aria-label="Slide anterior"
  >
    <app-icon name="chevron-left" [size]="24"></app-icon>
  </button>

  <button
    (click)="nextSlide()"
    class="absolute right-4 top-1/2 -translate-y-1/2 z-20 bg-black/50 hover:bg-black/75 text-white p-3 rounded-full transition-all"
    aria-label="Siguiente slide"
  >
    <app-icon name="chevron-right" [size]="24"></app-icon>
  </button>

  <!-- Indicadores -->
  <div class="absolute bottom-8 left-1/2 -translate-x-1/2 z-20 flex gap-3">
    @for (slide of slides; track $index) {
      <button
        (click)="goToSlide($index)"
        class="w-4 h-4 rounded-full transition-all"
        [class.bg-naranja]="currentSlide() === $index"
        [class.bg-gray-400]="currentSlide() !== $index"
        [attr.aria-label]="'Ir a slide ' + ($index + 1)"
      ></button>
    }
  </div>
</header>
