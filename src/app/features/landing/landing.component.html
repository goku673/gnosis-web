<div class="min-h-screen bg-gris-claro font-sans">
  <nav
    class="bg-azul text-white px-8 py-4 flex items-center justify-between shadow-md relative z-10"
  >
    <div class="flex items-center gap-3">
      <div
        class="w-10 h-10 bg-naranja rounded-full flex items-center justify-center font-bold text-xl"
      >
        G
      </div>
      <div>
        <h2 class="font-bold text-lg leading-tight">Instituto Tecnológico GNOSIS</h2>
        <p class="text-[0.65rem] text-gray-300 uppercase tracking-wider">
          Formando profesionales en Autotrónica
        </p>
      </div>
    </div>

    <div class="hidden md:flex items-center justify-center gap-8 font-medium text-sm w-1/3">
      <a
        href="#"
        class="flex items-center gap-2 bg-white text-azul px-4 py-2 rounded-full font-bold"
      >
        <app-icon name="home" [size]="16"></app-icon>
        INICIO
      </a>
      <a href="#" class="flex items-center gap-2 hover:text-naranja transition-colors">
        <app-icon name="users" [size]="16"></app-icon>
        AUTORIDADES
      </a>
      <a href="#" class="flex items-center gap-2 hover:text-naranja transition-colors">
        <app-icon name="user" [size]="16"></app-icon>
        DOCENTES
      </a>
    </div>
  </nav>

  <header
    class="relative bg-azul text-white overflow-hidden flex items-center justify-center min-h-[80vh]"
  >
    <div class="absolute inset-0 bg-black/40 z-0"></div>

    <div class="relative z-10 text-center max-w-4xl px-4 flex flex-col items-center">
      <div
        class="bg-naranja/20 border border-naranja text-naranja px-4 py-1.5 rounded-full text-sm font-bold flex items-center gap-2 mb-6"
      >
        <app-icon name="check-circle" [size]="16"></app-icon>
        Formación Técnica Superior
      </div>

      <h1 class="text-5xl md:text-7xl font-extrabold mb-6 tracking-tight">
        Carrera de Autotrónica
      </h1>

      <p class="text-lg md:text-xl text-gray-200 mb-10 max-w-2xl leading-relaxed">
        Conviértete en un experto en sistemas automotrices electrónicos y mecánicos. Formación
        integral en <span class="text-naranja font-bold">6 semestres</span> con enfoque práctico y
        profesional.
      </p>

      <div class="flex flex-col sm:flex-row gap-4">
        <app-button text="Ver Cursos de Temporada" variant="primary" icon="chevron-right">
        </app-button>

        <app-button text="Conocer la Carrera" variant="outline"> </app-button>
      </div>
    </div>
  </header>
</div>
