<div class="min-h-screen bg-gray-100 flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-white rounded-lg shadow-xl overflow-hidden">
    <!-- Header -->
    <div class="bg-azul text-white px-8 py-12 flex flex-col items-center gap-4">
      <div class="w-20 h-20 bg-white/20 rounded-full flex items-center justify-center">
        <app-icon name="settings" [size]="48" customClass="text-white"></app-icon>
      </div>
      <app-text tag="h1" size="3xl" weight="bold" customClass="text-white">
        Iniciar Sesión
      </app-text>
      <app-text variant="white">Portal de Autoridades y Administradores</app-text>
    </div>

    <!-- Formulario -->
    <div class="px-8 py-8" [formGroup]="form">
      <!-- Error general -->
      @if (loginError()) {
        <app-badge variant="danger" [dot]="true" customClass="w-full mb-5 py-2 px-3 rounded-lg">
          {{ loginError() }}
        </app-badge>
      }

      <!-- Tipo de Autoridad -->
      <app-form-field label="Tipo de Autoridad" fieldId="roleType" [required]="true">
        <app-select
          selectId="roleType"
          formControlName="roleType"
          [options]="roles"
          placeholder="Seleccione un rol"
          [errorMessage]="getError('roleType')"
        ></app-select>
      </app-form-field>

      <!-- Usuario -->
      <app-form-field
        label="Usuario"
        fieldId="username"
        [required]="true"
        [hint]="'Credencial de prueba: ' + currentDemo.username"
      >
        <app-input
          inputId="username"
          formControlName="username"
          placeholder="Ingrese su usuario"
          iconLeft="user"
          [errorMessage]="getError('username')"
        ></app-input>
      </app-form-field>

      <!-- Contraseña -->
      <app-form-field
        label="Contraseña"
        fieldId="password"
        [required]="true"
        [hint]="'Credencial de prueba: ' + currentDemo.password"
        spacing="lg"
      >
        <app-input
          inputId="password"
          formControlName="password"
          type="password"
          placeholder="Ingrese su contraseña"
          iconLeft="lock"
          [errorMessage]="getError('password')"
        ></app-input>
      </app-form-field>

      <!-- Botón -->
      <app-button
        variant="primary"
        size="lg"
        [fullWidth]="true"
        [loading]="isLoading()"
        iconLeft="login"
        (onClick)="handleLogin()"
      >
        Iniciar Sesión
      </app-button>
    </div>
  </div>
</div>
